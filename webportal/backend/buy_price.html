<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Buy Price Data — Niveshaay</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0f172a;color:#e2e8f0;font-family:'Inter',system-ui,sans-serif;min-height:100vh;padding:2rem}
  h1{font-size:1.4rem;font-weight:700;color:#f1f5f9;display:flex;align-items:center;gap:.6rem}
  h1 i{color:#60a5fa}
  .top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;margin-bottom:.5rem}
  .controls{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
  .subtitle{color:#94a3b8;font-size:.9rem;margin-bottom:1.5rem}
  select{background:#1e293b;color:#e2e8f0;border:1px solid rgba(255,255,255,.15);border-radius:7px;padding:.4rem .8rem;font-size:.88rem;cursor:pointer;outline:none}
  select:hover{border-color:#60a5fa}
  .btn-save{background:#3b82f6;color:#fff;border:none;border-radius:6px;padding:.4rem 1.1rem;font-size:.88rem;font-weight:600;cursor:pointer;transition:background .15s}
  .btn-save:hover:not(:disabled){background:#2563eb}
  .btn-save:disabled{opacity:.5;cursor:not-allowed}
  .btn-upload{background:rgba(99,102,241,.15);color:#a5b4fc;border:1px solid rgba(99,102,241,.35);border-radius:6px;padding:.4rem 1.1rem;font-size:.88rem;font-weight:600;cursor:pointer;transition:background .15s}
  .btn-upload:hover{background:rgba(99,102,241,.28);border-color:#818cf8}
  /* Modal */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:999;align-items:center;justify-content:center}
  .modal-overlay.open{display:flex}
  .modal-box{background:#1e293b;border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:2rem;width:min(500px,93vw);max-height:90vh;overflow-y:auto}
  .modal-box h2{margin:0 0 1.4rem;font-size:1.05rem;color:#f1f5f9}
  .modal-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.1rem}
  .modal-label{display:block;font-size:.76rem;color:#94a3b8;margin-bottom:.35rem}
  .modal-input{width:100%;padding:.45rem .7rem;background:#0f172a;border:1px solid rgba(255,255,255,.12);border-radius:6px;color:#e2e8f0;font-size:.84rem;box-sizing:border-box}
  .modal-input:focus{outline:none;border-color:#60a5fa}
  .drop-zone{border:2px dashed rgba(255,255,255,.15);border-radius:8px;padding:1.8rem 1rem;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;margin-bottom:.9rem}
  .drop-zone.over{border-color:#60a5fa;background:rgba(96,165,250,.06)}
  .drop-zone.has-file{border-color:rgba(16,185,129,.5)}
  .drop-hint{color:#94a3b8;font-size:.85rem;margin-bottom:.6rem}
  .btn-choose{background:#3b82f6;color:#fff;border:none;border-radius:5px;padding:.35rem 1rem;font-size:.8rem;cursor:pointer}
  .file-chosen{font-size:.77rem;color:#94a3b8;margin-top:.5rem}
  .modal-hint{font-size:.75rem;color:#64748b;margin-bottom:1.1rem}
  .modal-actions{display:flex;gap:.7rem;justify-content:flex-end}
  .btn-cancel{background:transparent;border:1px solid rgba(255,255,255,.12);color:#94a3b8;border-radius:6px;padding:.45rem 1.1rem;font-size:.84rem;cursor:pointer}
  .btn-cancel:hover{border-color:#94a3b8}
  .upload-result{margin-top:1rem;padding:.9rem 1rem;border-radius:7px;font-size:.82rem;line-height:1.6}
  .upload-result.ok{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:#6ee7b7}
  .upload-result.err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#fca5a5}
  .btn-add-row{background:rgba(16,185,129,.12);color:#10b981;border:1px solid rgba(16,185,129,.35);border-radius:5px;width:26px;height:26px;cursor:pointer;font-size:1.1rem;font-weight:700;display:inline-flex;align-items:center;justify-content:center;transition:background .15s}
  .btn-add-row:hover{background:rgba(16,185,129,.25);border-color:#10b981}
  .save-msg{font-size:.85rem;color:#10b981}
  .save-err{font-size:.85rem;color:#ef4444}
  .wrap{overflow-x:auto;margin-top:.5rem}
  table{width:100%;border-collapse:collapse;font-size:.86rem}
  thead th{background:rgba(255,255,255,.05);color:#94a3b8;font-weight:600;font-size:.78rem;text-transform:uppercase;letter-spacing:.05em;padding:.7rem 1rem;text-align:center;position:sticky;top:0;z-index:1;white-space:nowrap}
  thead th:first-child,thead th:nth-child(2),thead th:nth-child(5){text-align:left}
  tbody tr{border-bottom:1px solid rgba(255,255,255,.05);transition:background .12s}
  tbody tr:hover{background:rgba(255,255,255,.025)}
  td{padding:.6rem .8rem;text-align:center;vertical-align:middle}
  td:first-child,td:nth-child(2),td:nth-child(5){text-align:left}
  .editable{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.15);border-radius:4px;color:#e2e8f0;font-size:.86rem;padding:3px 6px;font-family:inherit;transition:border-color .15s,background .15s}
  .editable:hover{border-color:rgba(96,165,250,.4);background:rgba(96,165,250,.04)}
  .editable:focus{border-color:#60a5fa;background:rgba(96,165,250,.08);outline:none}
  input.editable.nse{width:8.5rem;font-weight:600;color:#e2e8f0}
  input.editable.wt{width:5rem;text-align:right}
  input.editable.seg{width:13rem;color:#94a3b8;font-size:.82rem}
  textarea.editable{width:15rem;resize:vertical;min-height:2rem;line-height:1.5;font-size:.82rem}
  .sec-name{color:#e2e8f0;font-size:.86rem}
  .pos{color:#10b981;font-weight:600}
  .neg{color:#ef4444;font-weight:600}
  .neu{color:#94a3b8}
  .btn-rm{background:rgba(239,68,68,.1);color:#ef4444;border:1px solid rgba(239,68,68,.28);border-radius:5px;width:26px;height:26px;cursor:pointer;font-size:1rem;font-weight:700;display:inline-flex;align-items:center;justify-content:center;transition:background .15s,transform .1s}
  .btn-rm:hover{background:rgba(239,68,68,.25);border-color:#ef4444;transform:scale(1.1)}
  .loading{color:#94a3b8;padding:2rem;text-align:center}
  .cmp-loading{color:#94a3b8;font-size:.78rem}
  tfoot td{font-weight:700;background:rgba(96,165,250,.06);border-top:2px solid rgba(96,165,250,.25);padding:.7rem 1rem;white-space:nowrap}
  .wt-total{color:#60a5fa;font-size:.95rem;font-weight:700}
  .wt-over{color:#ef4444}
  .ef-btn{display:inline-block;margin-left:4px;cursor:pointer;opacity:.55;font-size:.7rem;user-select:none;transition:opacity .15s}
  .ef-btn:hover,.ef-btn.active{opacity:1;color:#60a5fa}
  #bpDrop{position:fixed;background:#1e293b;border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:.4rem;min-width:170px;max-height:240px;overflow-y:auto;z-index:9999;display:none;box-shadow:0 8px 24px rgba(0,0,0,.5)}
  #bpDrop .ef-search{width:100%;padding:.3rem .5rem;background:#0f172a;border:1px solid rgba(255,255,255,.1);border-radius:4px;color:#e2e8f0;font-size:.8rem;margin-bottom:.3rem;box-sizing:border-box;outline:none}
  #bpDrop .ef-item{display:flex;align-items:center;gap:.45rem;padding:.25rem .4rem;border-radius:4px;cursor:pointer;font-size:.82rem;color:#e2e8f0;transition:background .1s}
  #bpDrop .ef-item:hover{background:rgba(255,255,255,.07)}
  #bpDrop .ef-item input{accent-color:#60a5fa;cursor:pointer}
  #bpDrop .ef-actions{display:flex;gap:.4rem;margin-top:.35rem;padding-top:.35rem;border-top:1px solid rgba(255,255,255,.08)}
  #bpDrop .ef-actions button{flex:1;padding:.25rem;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:4px;color:#94a3b8;font-size:.75rem;cursor:pointer}
  #bpDrop .ef-actions button:hover{background:rgba(96,165,250,.15);color:#60a5fa}
</style>
</head>
<body>
<div class="top">
  <h1><i>&#xf543;</i> Buy Price Data</h1>
  <div class="controls">
    <select id="basketSel"></select>
    <button class="btn-upload" onclick="openUploadModal()">&#x2B06; Upload Rebalance</button>
    <button class="btn-upload" onclick="openPdfModal()" style="color:#c4b5fd;border-color:rgba(167,139,250,.35)">&#x1F4C4; Upload Portfolio Report</button>
    <button class="btn-upload" onclick="exportBpCsv()" style="color:#6ee7b7;border-color:rgba(16,185,129,.35)">&#8595; Export CSV</button>
    <span id="saveMsg" class="save-msg" style="display:none"></span>
  </div>
</div>
<div class="subtitle" id="subtitle"></div>

<div class="wrap">
  <div id="tableArea" class="loading">Loading…</div>
</div>

<div id="bpDrop"></div>

<!-- Upload Rebalance Modal -->
<div class="modal-overlay" id="uploadOverlay" onclick="closeOnOverlay(event)">
  <div class="modal-box">
    <h2>Upload Rebalance CSV</h2>
    <div class="modal-row">
      <div>
        <label class="modal-label">Basket</label>
        <select id="uploadBasket" class="modal-input">
          <option value="Mid_Small_Cap">Mid &amp; Small Cap</option>
          <option value="Green_Energy">Green Energy</option>
          <option value="IPO_Basket">IPO Basket</option>
          <option value="Trends_Triology">Trends Triology</option>
          <option value="Techstack">Techstack</option>
          <option value="Make_in_India">Make in India</option>
          <option value="Consumer_Trends">Consumer Trends</option>
        </select>
      </div>
      <div>
        <label class="modal-label">Rebalance Date</label>
        <input id="uploadDate" type="date" class="modal-input">
      </div>
    </div>
    <div class="drop-zone" id="dropZone">
      <div class="drop-hint">Drag &amp; drop CSV file here</div>
      <button class="btn-choose" onclick="document.getElementById('fileInput').click();event.stopPropagation()">Choose File</button>
      <input type="file" id="fileInput" accept=".csv,text/csv" style="display:none" onchange="onFileChosen(this)">
      <div class="file-chosen" id="fileChosen"></div>
    </div>
    <p class="modal-hint">&#x2139; Expected columns: <strong>NSE Code, Security Name, Weight (%)</strong></p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeUploadModal()">Cancel</button>
      <button class="btn-save" id="btnUploadSubmit" onclick="submitUpload()">Upload</button>
    </div>
    <div class="upload-result" id="uploadResult" style="display:none"></div>
  </div>
</div>

<!-- Upload Portfolio Report Modal -->
<div class="modal-overlay" id="pdfOverlay" onclick="closePdfOnOverlay(event)">
  <div class="modal-box">
    <h2>Upload Portfolio Report</h2>
    <div class="modal-row">
      <div>
        <label class="modal-label">Basket</label>
        <select id="pdfBasket" class="modal-input">
          <option value="Mid_Small_Cap">Mid &amp; Small Cap</option>
          <option value="Green_Energy">Green Energy</option>
          <option value="IPO_Basket">IPO Basket</option>
          <option value="Trends_Triology">Trends Triology</option>
          <option value="Techstack">Techstack</option>
          <option value="Make_in_India">Make in India</option>
          <option value="Consumer_Trends">Consumer Trends</option>
        </select>
      </div>
      <div>
        <label class="modal-label">Rebalance Date</label>
        <input id="pdfDate" type="date" class="modal-input">
      </div>
    </div>
    <div class="drop-zone" id="pdfDropZone" onclick="document.getElementById('pdfFileInput').click()">
      <div class="drop-hint">Drag &amp; drop PDF file here</div>
      <button class="btn-choose" onclick="document.getElementById('pdfFileInput').click();event.stopPropagation()">Choose File</button>
      <input type="file" id="pdfFileInput" accept=".pdf,application/pdf" style="display:none" onchange="onPdfChosen(this)">
      <div class="file-chosen" id="pdfFileChosen"></div>
    </div>
    <p class="modal-hint">&#x2139; Upload the password-protected portfolio rebalance PDF report.</p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closePdfModal()">Cancel</button>
      <button class="btn-save" id="btnPdfSubmit" onclick="submitPdfUpload()">Upload</button>
    </div>
    <div class="upload-result" id="pdfResult" style="display:none"></div>
  </div>
</div>

<script>
const BASKETS = [
  {key:'Mid_Small_Cap',   label:'Mid & Small Cap'},
  {key:'Green_Energy',    label:'Green Energy'},
  {key:'IPO_Basket',      label:'IPO Basket'},
  {key:'Trends_Triology', label:'Trends Triology'},
  {key:'Techstack',       label:'Techstack'},
  {key:'Make_in_India',   label:'Make in India'},
  {key:'Consumer_Trends', label:'Consumer Trends'},
];

let rows = [];
let stocksRef = [];
let liveData = {};
let nseSymbols = [];
let liveLoaded = false;
let currentKey = BASKETS[0].key;

const sel = document.getElementById('basketSel');
BASKETS.forEach(b => {
  const o = document.createElement('option');
  o.value = b.key; o.textContent = b.label;
  sel.appendChild(o);
});
sel.addEventListener('change', () => { currentKey = sel.value; loadBasket(); });
document.getElementById('subtitle').textContent = BASKETS[0].label;
sel.addEventListener('change', () => {
  document.getElementById('subtitle').textContent = BASKETS.find(b=>b.key===sel.value)?.label||'';
});

// Load NSE symbols once
fetch('/api/nse-symbols').then(r=>r.json()).then(d=>{ nseSymbols = d; }).catch(()=>{});

// Load live data once
fetch('/api/live').then(r=>r.json()).then(d=>{ liveData=d; liveLoaded=true; refreshCmp(); }).catch(()=>{ liveLoaded=true; });

function fmt(v){ return v==null?'—':'₹'+Number(v).toLocaleString('en-IN',{maximumFractionDigits:2}); }
function fmtRet(v){
  if(v==null) return '<span class="neu">—</span>';
  const pct=(v*100).toFixed(2)+'%';
  return `<span class="${v>0?'pos':v<0?'neg':'neu'}">${pct}</span>`;
}

function loadBasket(){
  bpFilters={};
  document.getElementById('tableArea').innerHTML='<div class="loading">Loading…</div>';
  fetch('/api/basket/'+currentKey).then(r=>r.json()).then(d=>{
    const details = d.buyPriceDetails||{};
    const stocks  = d.stocks||[];
    stocksRef = stocks;
    const stockMap={};
    stocks.forEach(s=>{ stockMap[s.nseCode]=s; });
    const allKeys=[...new Set([...Object.keys(details),...stocks.map(s=>s.nseCode)])];
    rows = allKeys.map(nse=>{
      const det=details[nse]||{};
      const stk=stockMap[nse]||{};
      return {
        nseCode:     nse,
        securityName:det.securityName||'',
        segment:     det.segment||'',
        allocation:  stk.allocation!=null?(stk.allocation*100).toFixed(2):'',
        buyEvents:   det.buyEvents||'',
        sellEvents:  det.sellEvents||'',
        buyPrice:    stk.buyPrice||null,
        targetPrice: det.targetPrice!=null?det.targetPrice:'',
        stopLoss:    det.stopLoss!=null?det.stopLoss:'',
      };
    });
    renderTable();
  }).catch(()=>{ document.getElementById('tableArea').innerHTML='<div class="loading">Failed to load.</div>'; });
}

function renderTable(){
  if(!rows.length){ document.getElementById('tableArea').innerHTML='<div class="loading">No data.</div>'; return; }
  let html=`<table><thead><tr>
    <th>NSE Ticker<span class="ef-btn${bpFilters.nse?' active':''}" onclick="openBpFilter('nse',event)">&#9660;</span></th>
    <th>Security Name<span class="ef-btn${bpFilters.sec?' active':''}" onclick="openBpFilter('sec',event)">&#9660;</span></th>
    <th>Segment<span class="ef-btn${bpFilters.seg?' active':''}" onclick="openBpFilter('seg',event)">&#9660;</span></th>
    <th>Weight (%)<span class="ef-btn${bpFilters.wt?' active':''}" onclick="openBpFilter('wt',event)">&#9660;</span></th>
    <th>Buy Events</th><th>Sell Events</th><th>Wtd Avg Price</th>
    <th>Target Price</th><th>Stop Loss</th><th>CMP</th><th>Return (%)</th><th></th>
  </tr></thead><tbody>`;
  rows.forEach((r,i)=>{
    const live=liveData[r.nseCode];
    const cmp=live?.cmp??null;
    const ret=(cmp!=null&&r.buyPrice!=null&&r.buyPrice!==0)?(cmp-r.buyPrice)/r.buyPrice:null;
    const cmpCell=liveLoaded?fmt(cmp):'<span class="cmp-loading">Loading…</span>';
    const evLines=(r.buyEvents||'').split('\n').length;
    const rows_attr=Math.max(1,evLines);
    const sevCell = r.sellEvents
      ? `<textarea class="editable" id="sev-${i}" rows="${rows_attr}" oninput="scheduleSave()">${esc(r.sellEvents)}</textarea>`
      : `<span class="neu">—</span>`;
    html+=`<tr id="row-${i}">
      <td><input class="editable nse" id="nse-${i}" value="${esc(r.nseCode)}"
          oninput="onNseInput(${i},this.value)" onblur="onNseBlur(${i},this.value)"></td>
      <td><span class="sec-name" id="secname-${i}">${esc(r.securityName||'—')}</span></td>
      <td><input class="editable seg" id="seg-${i}" value="${esc(r.segment)}" oninput="scheduleSave()"></td>
      <td><input class="editable wt" id="wt-${i}" value="${esc(r.allocation)}" placeholder="0.00" oninput="scheduleSave()"></td>
      <td><textarea class="editable" id="ev-${i}" rows="${rows_attr}" oninput="scheduleSave()">${esc(r.buyEvents)}</textarea></td>
      <td>${sevCell}</td>
      <td>${fmt(r.buyPrice)}</td>
      <td><input class="editable wt" id="tp-${i}" value="${esc(r.targetPrice)}" placeholder="—" style="width:7rem" oninput="scheduleSave()"></td>
      <td><input class="editable wt" id="sl-${i}" value="${esc(r.stopLoss)}" placeholder="—" style="width:7rem" oninput="scheduleSave()"></td>
      <td id="cmp-${i}">${cmpCell}</td>
      <td id="ret-${i}">${fmtRet(ret)}</td>
      <td style="white-space:nowrap"><button class="btn-add-row" onclick="addRow()" title="Add stock">&#x2B;</button> <button class="btn-rm" onclick="removeRow(${i})" title="Remove">&#x2212;</button></td>
    </tr>`;
  });
  const totalWt=rows.reduce((s,r)=>{ const v=parseFloat(r.allocation); return s+(isNaN(v)?0:v); },0);
  const totalFmt=totalWt.toFixed(2);
  const overCls=totalWt>100.05?'wt-over':'';
  html+=`</tbody><tfoot><tr>
    <td colspan="3" style="text-align:right;color:#94a3b8;font-size:.78rem;text-transform:uppercase;letter-spacing:.06em">Total Weight</td>
    <td style="text-align:center"><span class="wt-total ${overCls}">${totalFmt}%</span></td>
    <td colspan="7"></td>
  </tr></tfoot></table>`;
  document.getElementById('tableArea').innerHTML=html;
  applyBpFilter();
}

function refreshCmp(){
  rows.forEach((r,i)=>{
    const live=liveData[r.nseCode];
    const cmp=live?.cmp??null;
    const ret=(cmp!=null&&r.buyPrice!=null&&r.buyPrice!==0)?(cmp-r.buyPrice)/r.buyPrice:null;
    const cmpEl=document.getElementById('cmp-'+i);
    const retEl=document.getElementById('ret-'+i);
    if(cmpEl) cmpEl.textContent=cmp==null?'—':'₹'+Number(cmp).toLocaleString('en-IN',{maximumFractionDigits:2});
    if(retEl) retEl.innerHTML=fmtRet(ret);
  });
}

function onNseInput(i, val){
  rows[i].nseCode=val;
  const upper=val.trim().toUpperCase();
  const match=nseSymbols.find(s=>s.symbol===upper);
  if(match){
    rows[i].securityName=match.name||'';
    const el=document.getElementById('secname-'+i);
    if(el) el.textContent=match.name||'—';
  }
  scheduleSave();
}
function onNseBlur(i, val){
  const upper=val.trim().toUpperCase();
  rows[i].nseCode=upper;
  const inp=document.getElementById('nse-'+i);
  if(inp) inp.value=upper;
  const match=nseSymbols.find(s=>s.symbol===upper);
  if(match){
    rows[i].securityName=match.name||'';
    const el=document.getElementById('secname-'+i);
    if(el) el.textContent=match.name||'—';
  }
}

function removeRow(i){
  rows.splice(i,1);
  renderTable();
  scheduleSave();
}

function addRow(){
  rows.push({nseCode:'',securityName:'',segment:'',allocation:'',buyEvents:'',sellEvents:'',buyPrice:null,targetPrice:'',stopLoss:''});
  renderTable();
  const inp=document.getElementById('nse-'+(rows.length-1));
  if(inp) inp.focus();
  scheduleSave();
}

function collectRows(){
  rows.forEach((r,i)=>{
    const nseEl=document.getElementById('nse-'+i);
    const segEl=document.getElementById('seg-'+i);
    const wtEl =document.getElementById('wt-'+i);
    const evEl =document.getElementById('ev-'+i);
    const sevEl=document.getElementById('sev-'+i);
    const tpEl =document.getElementById('tp-'+i);
    const slEl =document.getElementById('sl-'+i);
    if(nseEl) r.nseCode=nseEl.value.trim().toUpperCase();
    if(segEl) r.segment=segEl.value;
    if(wtEl)  r.allocation=wtEl.value;
    if(evEl)  r.buyEvents=evEl.value;
    if(sevEl) r.sellEvents=sevEl.value;
    if(tpEl)  r.targetPrice=tpEl.value?parseFloat(tpEl.value)||'':'';
    if(slEl)  r.stopLoss=slEl.value?parseFloat(slEl.value)||'':'';
  });
}

let _saveTimer = null;
function scheduleSave(){ clearTimeout(_saveTimer); _saveTimer = setTimeout(saveData, 1500); }

async function saveData(){
  collectRows();
  const msg=document.getElementById('saveMsg');
  msg.textContent='Saving…'; msg.className='save-msg'; msg.style.display='';

  const buyPriceDetails={};
  rows.forEach(r=>{
    if(!r.nseCode) return;
    buyPriceDetails[r.nseCode]={securityName:r.securityName,segment:r.segment,buyEvents:r.buyEvents,sellEvents:r.sellEvents||'',targetPrice:r.targetPrice||null,stopLoss:r.stopLoss||null};
  });

  const updatedStocks=stocksRef.map(s=>{
    const row=rows.find(r=>r.nseCode===s.nseCode);
    if(!row) return s;
    const pct=parseFloat(row.allocation);
    return {...s, allocation:isNaN(pct)?s.allocation:pct/100};
  });
  rows.forEach(r=>{
    if(!r.nseCode) return;
    if(!updatedStocks.find(s=>s.nseCode===r.nseCode)){
      const pct=parseFloat(r.allocation);
      updatedStocks.push({nseCode:r.nseCode,allocation:isNaN(pct)?0:pct/100});
    }
  });

  try{
    const resp=await fetch('/api/basket/'+currentKey,{
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({stocks:updatedStocks,buyPriceDetails}),
    });
    if(!resp.ok) throw new Error();
    stocksRef=updatedStocks;
    msg.textContent='Saved'; msg.className='save-msg'; msg.style.display='';
    setTimeout(()=>{ msg.style.display='none'; },2000);
    try{ new BroadcastChannel('bp_update').postMessage({basket:currentKey}); }catch(_){}
  }catch{
    msg.textContent='Save failed'; msg.className='save-err'; msg.style.display='';
  }
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Upload Modal ──────────────────────────────────────────────────────────────
let uploadFile = null;

function openUploadModal(){
  document.getElementById('uploadBasket').value = currentKey;
  document.getElementById('uploadResult').style.display = 'none';
  document.getElementById('fileChosen').textContent = '';
  document.getElementById('dropZone').classList.remove('has-file','over');
  document.getElementById('uploadDate').value = '';
  uploadFile = null;
  document.getElementById('uploadOverlay').classList.add('open');
}

function closeUploadModal(){
  document.getElementById('uploadOverlay').classList.remove('open');
  uploadFile = null;
}

function closeOnOverlay(e){
  if(e.target === document.getElementById('uploadOverlay')) closeUploadModal();
}

function onFileChosen(input){
  if(input.files.length){
    uploadFile = input.files[0];
    document.getElementById('fileChosen').textContent = uploadFile.name;
    document.getElementById('dropZone').classList.add('has-file');

}

(function(){
  const dz = document.getElementById('dropZone');
  dz.addEventListener('dragover', e=>{ e.preventDefault(); dz.classList.add('over'); });
  dz.addEventListener('dragleave', ()=>{ dz.classList.remove('over'); });
  dz.addEventListener('drop', e=>{
    e.preventDefault(); dz.classList.remove('over');
    const f = e.dataTransfer.files[0];
    if(f){ uploadFile=f; document.getElementById('fileChosen').textContent=f.name; dz.classList.add('has-file'); }
  });
  dz.addEventListener('click', e=>{
    if(e.target===dz || e.target.classList.contains('drop-hint'))
      document.getElementById('fileInput').click();
  });
})();

async function submitUpload(){
  const basket = document.getElementById('uploadBasket').value;
  const date   = document.getElementById('uploadDate').value;
  const res    = document.getElementById('uploadResult');
  if(!date){ res.className='upload-result err'; res.textContent='Please select a rebalance date.'; res.style.display=''; return; }
  if(!uploadFile){ res.className='upload-result err'; res.textContent='Please choose a CSV file.'; res.style.display=''; return; }
  const btn = document.getElementById('btnUploadSubmit');
  btn.disabled=true; btn.textContent='Uploading…';
  res.style.display='none';
  const fd = new FormData();
  fd.append('basket', basket);
  fd.append('date', date);
  fd.append('file', uploadFile);
  try{
    const r = await fetch('/api/upload-rebalance', {method:'POST', body:fd});
    const data = await r.json();
    if(data.duplicate){
      res.className='upload-result err';
      res.textContent='CSV File has been already uploaded.';
    } else if(data.ok){
      const ch = data.changes||{};
      const lines = ['✓ Upload successful — '+data.stockCount+' stocks in '+data.basket];
      if(ch.added?.length)     lines.push('Added: '+ch.added.join(', '));
      if(ch.removed?.length)   lines.push('Removed: '+ch.removed.join(', '));
      if(ch.increased?.length) lines.push('Increased: '+ch.increased.join(', '));
      if(ch.decreased?.length) lines.push('Decreased: '+ch.decreased.join(', '));
      res.className='upload-result ok';
      res.innerHTML=lines.join('<br>');
      if(basket===currentKey) loadBasket();
    } else {
      res.className='upload-result err';
      res.textContent=data.detail||data.message||'Upload failed.';
    }
  }catch{
    res.className='upload-result err';
    res.textContent='Network error — upload failed.';
  }finally{
    btn.disabled=false; btn.textContent='Upload';
    res.style.display='';
  }
}

// ── CSV Export ────────────────────────────────────────────────────────────────
function exportBpCsv(){
  if(!confirm('Export all buy price data as a CSV file?')) return;
  collectRows();
  const ce=v=>{ const s=String(v==null?'':v).trim(); return /[,"\n\r]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s; };
  const hdrs=['NSE Ticker','Security Name','Segment','Weight (%)','Buy Events','Sell Events','Wtd Avg Price','Target Price','Stop Loss','CMP','Return (%)'];
  const lines=[hdrs.map(ce).join(',')];
  rows.forEach(r=>{
    const live=liveData[r.nseCode];
    const cmp=live?.cmp??null;
    const ret=(cmp!=null&&r.buyPrice!=null&&r.buyPrice!==0)?((cmp-r.buyPrice)/r.buyPrice*100).toFixed(2)+'%':'';
    lines.push([r.nseCode,r.securityName,r.segment,r.allocation,r.buyEvents,r.sellEvents,r.buyPrice??'',r.targetPrice,r.stopLoss,cmp??'',ret].map(ce).join(','));
  });
  const blob=new Blob(['﻿'+lines.join('\r\n')],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='buy_price_data_'+currentKey+'.csv';
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}

// ── Column Filters ────────────────────────────────────────────────────────────
let bpFilters = {};
let _bpDropCol = null;

function getBpVal(row, col){
  const el = document.getElementById(col+'-'+row);
  if(!el) return '—';
  const v = (el.value||el.textContent||'').trim();
  return v||'—';
}

function applyBpFilter(){
  const tbody = document.querySelector('#tableArea table tbody');
  if(!tbody) return;
  const trs = tbody.querySelectorAll('tr');
  trs.forEach((tr,i)=>{
    const nseOk  = !bpFilters.nse||bpFilters.nse.size===0||bpFilters.nse.has(getBpVal(i,'nse'));
    const secEl  = document.getElementById('secname-'+i);
    const secVal = secEl?(secEl.textContent||'').trim()||'—':'—';
    const secOk  = !bpFilters.sec||bpFilters.sec.size===0||bpFilters.sec.has(secVal);
    const segOk  = !bpFilters.seg||bpFilters.seg.size===0||bpFilters.seg.has(getBpVal(i,'seg'));
    const wtOk   = !bpFilters.wt ||bpFilters.wt.size===0 ||bpFilters.wt.has(getBpVal(i,'wt')+'%')||bpFilters.wt.has(getBpVal(i,'wt'));
    tr.style.display=(nseOk&&secOk&&segOk&&wtOk)?'':'none';
  });
}

function openBpFilter(col, evt){
  evt.stopPropagation();
  const drop = document.getElementById('bpDrop');
  if(_bpDropCol===col && drop.style.display==='block'){ drop.style.display='none'; _bpDropCol=null; return; }
  _bpDropCol = col;

  // collect unique values
  const tbody = document.querySelector('#tableArea table tbody');
  const vals = new Map();
  if(tbody){
    tbody.querySelectorAll('tr').forEach((tr,i)=>{
      let v;
      if(col==='sec'){
        const el=document.getElementById('secname-'+i);
        v=el?(el.textContent||'').trim()||'—':'—';
      } else if(col==='wt'){
        const el=document.getElementById('wt-'+i);
        const raw=(el?el.value:'')||'';
        v=raw?raw+'%':'—';
      } else {
        v=getBpVal(i,col);
      }
      vals.set(v,(vals.get(v)||0)+1);
    });
  }
  const sorted=[...vals.keys()].sort((a,b)=>a.localeCompare(b,undefined,{numeric:true}));
  const active=bpFilters[col]||new Set();

  let html='<input class="ef-search" placeholder="Search…" oninput="bpDropSearch(this.value)">';
  html+='<div id="bpDropList">';
  sorted.forEach(v=>{
    const chk=active.has(v)?'checked':'';
    html+=`<label class="ef-item"><input type="checkbox" value="${esc(v)}" ${chk} onchange="bpDropToggle(this)">${esc(v)}</label>`;
  });
  html+='</div>';
  html+='<div class="ef-actions"><button onclick="bpDropAll()">All</button><button onclick="bpDropClear()">Clear</button></div>';
  drop.innerHTML=html;

  const btn=evt.target;
  const rect=btn.getBoundingClientRect();
  drop.style.left=Math.min(rect.left,window.innerWidth-185)+'px';
  drop.style.top=(rect.bottom+4)+'px';
  drop.style.display='block';
}

function bpDropSearch(q){
  const low=q.toLowerCase();
  document.querySelectorAll('#bpDropList .ef-item').forEach(el=>{
    el.style.display=el.textContent.toLowerCase().includes(low)?'':'none';
  });
}

function bpDropToggle(cb){
  if(!bpFilters[_bpDropCol]) bpFilters[_bpDropCol]=new Set();
  if(cb.checked) bpFilters[_bpDropCol].add(cb.value);
  else bpFilters[_bpDropCol].delete(cb.value);
  applyBpFilter();
  // update active indicator on the th without full re-render
  const thMap={'nse':0,'sec':1,'seg':2,'wt':3};
  const thIdx=thMap[_bpDropCol];
  const ths=document.querySelectorAll('#tableArea table thead th');
  if(ths[thIdx]){
    const sp=ths[thIdx].querySelector('.ef-btn');
    if(sp) sp.className='ef-btn'+(bpFilters[_bpDropCol].size>0?' active':'');
  }
}

function bpDropAll(){
  bpFilters[_bpDropCol]=new Set();
  document.getElementById('bpDrop').style.display='none';
  _bpDropCol=null;
  renderTable();
}

function bpDropClear(){
  bpFilters[_bpDropCol]=new Set();
  document.querySelectorAll('#bpDrop input[type=checkbox]').forEach(cb=>cb.checked=false);
  applyBpFilter();
  const thMap={'nse':0,'sec':1,'seg':2,'wt':3};
  const ths=document.querySelectorAll('#tableArea table thead th');
  const sp=ths[thMap[_bpDropCol]]?.querySelector('.ef-btn');
  if(sp) sp.className='ef-btn';
}

document.addEventListener('click',()=>{ document.getElementById('bpDrop').style.display='none'; _bpDropCol=null; });
document.getElementById('bpDrop').addEventListener('click',e=>e.stopPropagation());

// Init
loadBasket();
</script>
